repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: '^tests/fixtures/notebook_parity/'
      - id: trailing-whitespace
        exclude: '^tests/fixtures/notebook_parity/'
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args:
          - --line-length=120
          - --extend-exclude=tests/fixtures/notebook_parity/archive_assets,tests/fixtures/notebook_parity/evaluation_assets
      - id: ruff-format
        args:
          - --line-length=120
          - --exclude=tests/fixtures/notebook_parity/archive_assets,tests/fixtures/notebook_parity/evaluation_assets
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        args:
          - --line-length=120
