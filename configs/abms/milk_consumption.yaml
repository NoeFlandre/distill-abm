name: milk_consumption
metric_pattern: mean-incum
metric_description: average weekly whole milk consumption per agent
plot_descriptions:
  - "The attachment is the plot representing the average weekly consumption of whole milk per agent."
  - "The attachment is the plot representing the average weekly consumption of skimmed and semi-skimmed milk per agent."
  - "The attachment is the plot representing the total number of times agents have chosen whole milk."
  - "The attachment is the plot representing the total number of times agents have chosen skimmed or semi-skimmed milk."
  - "The attachment is the plot representing the total number of milk choices made by all agents combined."
  - "The attachment is the plot representing the mean quantity of whole milk consumed by agents."
  - "The attachment is the plot representing the mean quantity of skimmed and semi-skimmed milk consumed by agents."
  - "The attachment is the plot representing the mean factor applied to the whole milk choice function due to habit."
  - "The attachment is the plot representing the mean factor applied to the skimmed and semi-skimmed milk choice function due to habit."
  - "The attachment is the plot representing the mean percentage difference between the maximum and minimum choice function scores among agents."
  - "The attachment is the plot representing the mean deviation between the agents' held health values and the implied values by their milk choices."
  - "The attachment is the plot representing the mean deviation between the agents' held environmental values and the implied values by their milk choices."
default_input_csv: data/milk_consumption_abm/legacy/reducedmilk.csv
netlogo_viz:
  experiment_name: Milk Consumption Trends
  num_runs: 30
  max_ticks: 32
  interval: 1
  experiment_parameters:
    number-of-agents: 1000
    habit-on?: true
    network-type: '"watts-strogatz"'
    norms: true
    network-parameter: 8
    memory-lifetime: 5
    habit-threshold: 2
    cognitive-dissonance-threshold: 0.15
    p-interact: 0.3
    social-blindness: 0.51
    social-conformity: 0.28
    social-susceptibility: 0.2
    alt-health-mean-initial: 1.69
    alt-env-mean-initial: 1.12
    incumbent-initial-habit: 10
    justification: 0.61
  smoke_num_runs: 30
  smoke_max_ticks: 33
  smoke_interval: 1
  fallback_mode: always
  fallback_csv: data/milk_consumption_abm/legacy/reducedmilk.csv
  fallback_plot_dir: data/milk_consumption_abm/legacy/plots
  reporters:
    - mean-incum
    - mean-alt
    - incum-total-try
    - alt-total-try
    - choice-total
    - mean [incum-quantity] of turtles
    - mean [alt-quantity] of turtles
    - mean [habit-factor-incum] of turtles
    - mean [habit-factor-alt] of turtles
    - mean [choice-function-deviation] of turtles
    - mean [value-health-deviation] of turtles
    - mean [value-env-deviation] of turtles
  plots:
    - reporter_pattern: mean-incum
      title: Mean Whole Milk Consumption
      y_label: Mean Whole Milk Consumption
    - reporter_pattern: mean-alt
      title: Mean Skimmed/Semi-Skimmed Milk Consumption
      y_label: Mean Skimmed/Semi-Skimmed Milk Consumption
    - reporter_pattern: incum-total-try
      title: Total Whole Milk Choices
      y_label: Total Whole Milk Choices
    - reporter_pattern: alt-total-try
      title: Total Skimmed/Semi-Skimmed Milk Choices
      y_label: Total Skimmed/Semi-Skimmed Milk Choices
    - reporter_pattern: choice-total
      title: Total Choices Made
      y_label: Total Choices Made
    - reporter_pattern: mean [incum-quantity] of turtles
      title: Mean Whole Milk Quantity
      y_label: Mean Whole Milk Quantity
    - reporter_pattern: mean [alt-quantity] of turtles
      title: Mean Skimmed/Semi-Skimmed Milk Quantity
      y_label: Mean Skimmed/Semi-Skimmed Milk Quantity
    - reporter_pattern: mean [habit-factor-incum] of turtles
      title: Mean Habit Factor for Whole Milk
      y_label: Mean Habit Factor for Whole Milk
    - reporter_pattern: mean [habit-factor-alt] of turtles
      title: Mean Habit Factor for Skimmed/Semi-Skimmed Milk
      y_label: Mean Habit Factor for Skimmed/Semi-Skimmed Milk
    - reporter_pattern: mean [choice-function-deviation] of turtles
      title: Mean Choice Function Deviation
      y_label: Mean Choice Function Deviation
    - reporter_pattern: mean [value-health-deviation] of turtles
      title: Mean Value Health Deviation
      y_label: Mean Value Health Deviation
    - reporter_pattern: mean [value-env-deviation] of turtles
      title: Mean Value Environmental Deviation
      y_label: Mean Value Environmental Deviation
