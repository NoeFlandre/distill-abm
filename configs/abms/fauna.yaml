name: fauna
metric_pattern: count-species
metric_description: species abundance dynamics across repeated fauna simulations
plot_descriptions:
  - "This plot represents the number of human hunter-gatherer bands currently active in the simulation."
  - "This plot represents the total energy available to all forager bands, reflecting their energy status which is influenced by hunting success and movement costs."
  - "This plot represents the cumulative number of male prey animals hunted and killed by forager bands."
  - "This plot represents the cumulative number of female prey animals hunted and killed by forager bands."
  - "This plot represents the cumulative number of postpartum female prey animals (females with offspring) hunted and killed by forager bands."
  - "This plot represents the cumulative number of births among the prey animal population."
  - "This plot represents the cumulative number of deaths among the prey animal population, from both natural causes and predation by foragers."
  - "This plot represents the current number of male prey animals in the simulation."
  - "This plot represents the current number of female prey animals in the simulation."
  - "This plot represents the current total number of all prey animals (both males and females) in the simulation."
  - "This plot represents the combined total energy available in the population of male prey animals."
  - "This plot represents the combined total energy available in the population of female prey animals."
  - "This plot represents the combined total energy available in all prey animals within the simulation."
  - "This plot represents the percentage of landscape patches that are currently vegetated (i.e., green), indicating the availability of fodder (grass) for the prey animals."
netlogo_viz:
  experiment_name: 2023-20-6-0.33-0.8
  num_runs: 40
  max_ticks: 73000
  interval: 50
  smoke_num_runs: 40
  smoke_max_ticks: 73000
  smoke_interval: 50
  fallback_mode: always
  fallback_csv: data/abms/fauna/legacy/reduced_version.csv
  fallback_plot_dir: data/abms/fauna/legacy/plots
  reporters:
    - num-foragers
    - sum [energy] of foragers
    - males-killed
    - females-killed
    - ppfem-killed
    - birth-count
    - death-count
    - count animals with [species = 1]
    - count animals with [species = 2]
    - count animals
    - sum [energy] of animals with [species = 1]
    - sum [energy] of animals with [species = 2]
    - sum [energy] of animals
    - ( ( count patches with [ pcolor = green ] ) / ( count patches ) ) * 100
  plots:
    - reporter_pattern: num-foragers
      title: Number of Foragers
      y_label: Number of Foragers
    - reporter_pattern: sum [energy] of foragers
      title: Total Energy of Foragers
      y_label: Total Energy of Foragers
    - reporter_pattern: males-killed
      title: Number of Males Killed
      y_label: Number of Males Killed
      exclude_pattern: females-killed
    - reporter_pattern: females-killed
      title: Number of Females Killed
      y_label: Number of Females Killed
    - reporter_pattern: ppfem-killed
      title: Number of Postpartum Females Killed
      y_label: Number of Postpartum Females Killed
    - reporter_pattern: birth-count
      title: Number of Births
      y_label: Number of Births
    - reporter_pattern: death-count
      title: Number of Deaths
      y_label: Number of Deaths
    - reporter_pattern: count animals with [species = 1]
      title: Number of Male Animals
      y_label: Number of Male Animals
    - reporter_pattern: count animals with [species = 2]
      title: Number of Female Animals
      y_label: Number of Female Animals
    - reporter_pattern: count animals
      title: Total Number of Animals
      y_label: Total Number of Animals
      exclude_pattern: count animals with
    - reporter_pattern: sum [energy] of animals with [species = 1]
      title: Total Energy of Male Animals
      y_label: Total Energy of Male Animals
    - reporter_pattern: sum [energy] of animals with [species = 2]
      title: Total Energy of Female Animals
      y_label: Total Energy of Female Animals
    - reporter_pattern: sum [energy] of animals
      title: Total Energy of All Animals
      y_label: Total Energy of All Animals
      exclude_pattern: with [species
    - reporter_pattern: ( ( count patches with [ pcolor = green ] ) / ( count patches ) ) * 100
      title: Percentage of Green Patches
      y_label: Percentage of Green Patches
