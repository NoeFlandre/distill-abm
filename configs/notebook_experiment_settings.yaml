    processing-cost-females: 3
    keep-initial-grass-pattern: true
    maximum-lifespan: 10220
    food-value-males: 30
    internal-mortality: 0.025
    max-ticks: 73000
    animals-movement-cost: 1
    external-mortality: 0.0025
    stop-at-max-herd-size: false
    init-prey: 250
    foraging-radius: 6
    stop-at-max-ticks: true
    food-value-calf: 3
    grass-growth: true
    imortal-foragers: true
    grass-proportion: 0.33
    ticks-per-year: 365
    foragers-movement-cost: 1
    animals-starvation-threshold: 25
    animals-gain-from-food: 1.5
    seasonality: 0.8
    processing-cost-males: 6
    age-of-senescence: 7300
    birth-spacing: 730
    max-herd-size: 500
    food-value-females: 27
    regrowth-time: 3
    food-storage: true
