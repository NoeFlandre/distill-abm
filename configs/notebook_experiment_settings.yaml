    number-of-agents: 1000
    habit-on?: true
    network-type: '"watts-strogatz"'
    norms: true
    network-parameter: 8
    memory-lifetime: 5
    habit-threshold: 2
    cognitive-dissonance-threshold: 0.15
    p-interact: 0.3
