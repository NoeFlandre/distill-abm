context_prompt: |
  Your goal is to explain an agent-based model.
  Your explanation must include the context of the model, its goals, and key parameters.
  For each parameter, include the range of values (if provided) and the value that we have set.
  Do not write any summary or conclusion.
  {parameters}

  The context and goals of the model are as follows.
  {documentation}
trend_prompt: |
  We have a plot from repeated simulations of an agent based model.
  Your goal is to describe the trends in details from the plot, mentioning key time steps and values taken by the metric in the plot, and interpreting them based on the context of the model.
  The report must objectively describe the trends in the data without addressing the quality of the simulation.
  Do not refer to the plot or any visual in your description.
  If a plot has very simple dynamics, simply state them without expanding.
  Metric description: {description}
  Context: {context}
coverage_eval_prompt: |
  Your task is to rate a report based on its coverage with respect to an input context and input plots. Coverage is on a scale from 1 (worst) to 5 (perfect). Your answer must state the number you give for coverage followed by your step-by-step reasoning.
  Consider the following examples. For example, the input context is: The context and goals of the model are as follows. The overall objective of the agent-based model is to simulate urban mobility patterns and the use of various modes of transportation by the population of a mid-sized city. Specifically, the goal of the model is to explore the influence of transportation preferences, availability of public and private transport options, and urban infrastructure on the daily movement and interaction of city residents. The model aims to replicate the changes in transportation behaviors and the usage patterns of different mobility options over time. and the input plot is given to you as an attachment and tagged with the label "Image used for the example".
  An example of a report is: The primary aim of the agent-based model is to replicate urban mobility patterns and the utilization of various transportation modes by the inhabitants of a medium-sized city. The model's specific objective is to investigate how transportation preferences, the availability of public and private transport options, and urban infrastructure affect the daily movements and interactions of city residents. It seeks to simulate the evolution of transportation behaviors and the usage patterns of different mobility options over time.

  The mean distance traveled by private car by the agents starts at around 2700 units, rapidly decreases to about 1200 units over the first 5 time steps, and then continues to decline more slowly.
  This example scores 5 on coverage, because it only provided information that was in the input (no hallucinations).
  Another example of a report is: The primary aim of the agent-based model is to replicate urban mobility patterns and the utilization of various transportation modes by the inhabitants of a medium-sized city. The model's specific objective is to investigate how transportation preferences, the availability of public and private transport options, and urban infrastructure affect the daily movements and interactions of city residents. It seeks to simulate the evolution of transportation behaviors and the usage patterns of different mobility options over time.
  This model was requested by the city of Paris in a way to reduce the number of cars.

  The mean distance traveled by private car by the agents starts at around 2700 units, rapidly decreases to about 1200 units over the first 5 time steps, and then continues to decline more slowly. The main car brand used by agents is Toyota.
  This example scores 3 on coverage: it lost two points because it gave two pieces of information that were not in the input (car brand, model commissioner).
  A third example is: The primary aim of the agent-based model is to replicate urban mobility patterns. The model's specific objective is to investigate how transportation preferences, the availability of public and private transport options, and urban infrastructure affect the daily movements and interactions of city residents.

  The mean distance traveled by private car by the agents starts at around 2700 units and rapidly decreases to about 1200 units over the first 5 time steps.
  This example scores 5 on coverage, because it only provided information that was in the input (no hallucinations).
  A last example is: The primary aim of the agent-based model is to replicate urban mobility patterns. The model's specific objective is to investigate how transportation preferences, the availability of public and private transport options, and urban infrastructure affect the daily movements and interactions of city residents. This model was requested by the city of Paris in a way to reduce the number of cars.

  The mean distance traveled by private car by the agents starts at around 2700 units and rapidly decreases to about 1200 units over the first 5 time steps. The main car brand used by agents is Toyota.
  This last example scores 3 on coverage: it lost two points because it gave two pieces of information that were not in the input (car brand, model commissioner).
  In your case, the input context is: {source} The accompanying input plots are given to you as an attachment.
  The report that you must rate for coverage is {summary}
  Return "Coverage score: <1-5>" and brief reasoning.
