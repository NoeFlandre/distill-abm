llm_request:
  temperature: 1.0
  max_tokens: 1000
  max_retries: 2
  retry_backoff_seconds: 2.0

run:
  provider: openrouter
  model: moonshotai/kimi-k2.5
  output_dir: results/pipeline
  metric_pattern: mean
  metric_description: simulation trend
  evidence_mode: plot+table
  text_source_mode: summary_only
  summarizers:
    - bart
    - bert
    - t5
    - longformer_ext

qualitative:
  provider: openrouter
  model: google/gemini-3.1-pro-preview

smoke:
  provider: openrouter
  output_dir: results/smoke_debug
  model: google/gemini-3.1-pro-preview
  metric_pattern: mean
  metric_description: simulation trend
  evidence_mode: plot+table
  text_source_mode: summary_only
  summarizers:
    - bart
    - bert
    - t5
    - longformer_ext
  run_qualitative: true
  run_sweep: true

doe:
  output_csv: results/doe/anova_factorial_contributions.csv
  max_interaction_order: 2
