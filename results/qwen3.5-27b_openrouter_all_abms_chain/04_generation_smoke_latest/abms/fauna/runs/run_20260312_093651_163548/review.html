 processing-cost-females, from 0.0 to 20.0. We set it to 3.\n  - food-value-females, from 5.0 to 100.0. We set it to 27.\n  - init-prey, from 0.0 to 1000.0. We set it to 250.\n  - internal-mortality, from 0.0 to 0.2. We set it to 0.025.\n  - age-of-senescence, from 0.0 to 10000.0. We set it to 7300.\n  - ticks-per-year, from 0.0 to 720.0. We set it to 365.\n  - animals-gain-from-food, from 0.0 to 10.0. We set it to 1.5.\n  - animals-starvation-threshold, from 0.0 to 100.0. We set it to 25.\n  - animals-movement-cost, from 0.0 to 10.0. We set it to 1.\n  - foragers-movement-cost, from 0.0 to 10.0. We set it to 1.\n  - grass-proportion, from 0.0 to 1.0. We set it to 0.33.\n  - external-mortality, from 0.0 to 0.2. We set it to 0.0025.\n  - birth-spacing, from 0.0 to 1000.0. We set it to 730.\n  - foraging-radius, from 1.0 to 100.0. We set it to 6.\n  - food-value-calf, from 0.0 to 20.0. We set it to 3.\n  - seasonality, from 0.0 to 1.0. We set it to 0.8.\n  - regrowth-time, from 0.0 to 365.0. We set it to 3.\n  - stop-at-max-ticks. We set it to True.\n  - stop-at-max-herd-size. We set it to False.\n  - grass-growth. We set it to True.\n  - keep-initial-grass-pattern. We set it to True.\n  - imortal-foragers. We set it to True.\n  - food-storage. We set it to True.\n  - max-ticks. We set it to 73000.\n  - max-herd-size. We set it to 500.\n\n\nThe context and goals of the model are as follows. The Megafaunal Hunting Pressure Model (MHPM) is an interactive, agent-based model designed to conduct experiments to test megaherbivore extinction hypotheses. The model considers environmental change, human hunting behavior, herd demography, herd movement, animal sexual dimorphism, and animal life history.\n\nYou first see a simplified grassland environment with randomly generated patches of grass, male and female ungulates, and human hunters. Depending on the hypotheses and/or data from a specific case study, you can manipulate the sliders in the NetLogo interface to establish the socio-natural dynamics of the experiment matrix. Broadly, the model allows you to change the following unitless categories that exist on a continuous scale: fodder availability, seasonality, relative animal food value, animal fecundity, lifespans of hunters and animals, relative hunting danger, as well as the energy required to move in the environment. Ideally, experimental dynamics will demonstrate how environmental conditions, human hunting, and animal life history interact to either accelerate or buffer extinction or create equilibrium conditions which do not result in an extinction event. The temporal units used in NetLogo are “ticks,” which can be scaled to any temporal granularity.  \nThe landscape consists of an abstract square universe that wraps at the edges. It exists on a 211x211 patch matrix and a relative spatial scale. Although these patches are unitless, it may, be useful to image the landscape in km2 based on approximations of daily distance traveled by megaherbivores. For example, S. caffer walks approximately 3.4 km/day which scales a single patch to ~911 km2. These values will change for each case study.\n\nThis is an interactive manual model. The user can fully manipulate the variables to test a wide range of hypotheses related to extinction in a socio-natural system. To begin first select the variables you would like to test in your extinction scenario (i.e., environmental patchiness or animal fecundity). We recommend keeping most variables constant, and only changing 1-3 variables per experiment. The user can also set the max ticks, which will stop the experiment after a designated number of ticks. Once the independent variables have been selected, use the interactive sliders to move them a few units at a time, avoiding large, drastic jumps in relative scale. When you are ready to run your experiment click the setup button. This will generate a landscape that matches the environment, herd demography, and hunting pressure reflected in the user’s parameterization. Then click the run button, and the experiment will begin. \nHunters are embedded with logic that approximates dynamic optimal foraging theory. In this model, hunter’s foraging decisions very in response to environmental feedback. The decision to pursue a prey item is balanced between the current energy-status of the hunter, the food value of the prey, the relative density of prey in the landscape, and the cost of pursuing, hunting, and processing the animal. Hunters do not reproduce and loose a user-set amount of energy as they move in their environment. Hunters can die if they run out of energy, they can also store energy from food and create an energy surplus, which is consumed before hunting is resumed. Users can turn human mortality on or off. \nUngulate herds are sexually dimorphic, with distinct user-determined food value and processing costs for males and females. Animals are also capable of reproduction, and sex ratios and probability of reproduction can be controlled by the user. Additionally, females can become pregnant and spawn offspring. Once spawned, offspring nurse for a set amount of time determined by the user. A nursing offspring adds to the food value of the female. This allows the user to approximate animal life history with novel detail. Animals are programmed to move as a herd with feedback from environmental conditions. Animals age, and the probability of random death increase once the animal reaches senescence. There is also external morality probability which can be adjusted by the user to simulate a percentage of animals that die from non-human predation at each time-step. Maximum animal lifespan is also a slider set by the user. \nThe environment can be controlled by the user by changing the density of fodder in the landscape (grass-proportion) and the time it takes for grass to regrow once it has been grazed (grass-regrowth). Grass regrowth can be turned off which will create a static environment. Additionally, users can choose to the keep-initial option, which limited grass regrowth only to the areas that were initially vegetated. Users can also utilize a seasonality slider, which limits grass regrowth to a user determined seasonal cycle. \nThe process of refining and experimenting with the relative value of independent and constant variables can be repeated until the experimental parameters appears to behave logically and work well to test the user’s hypotheses. When selecting values, it is useful to keep in mind that these values have relative, as opposed to absolute, value. For example, when picking a value for food-value-male and food-value-female (the energy hunter’s gain from eating male or female prey) do not think of the numbers in terms of kilogram or calories, but rather the relative size of males to females. In this case, a 2–5-unit difference may be sufficient to demonstrate how sexual dimorphism may impact human hunters operating under optimal foraging logic. The experiment will stop when: 1) human hunters die off, or 3) the experiment reaches the maximum number of ticks set by the user.\n\nSUMMARY STATISTICS\nSummary statistics are shown on the bottom left side in labeled output boxes and are formatting as continuous line graphs that reflect new data from each tick. They include: \n    • Number of prey-items taken per 10 ticks. Three lines are generated to show how many males, females, or post-partum females are hunted over the past 10-tick cycle.  \n    • Proportion of grazed to ungrazed grass on a scale of 0-100. \n    • Forager energy, which changes as hunters exploit prey and move in their environment. \n    • Number of animals in the environment. Three lines are generated to show how many males, females, or post-partum females are in the environment over time.\n(More information about the NetLogo Behavior Space needed)\n\nTo begin manual experiments prior to identifying final experimental parameters for the behavior space, establish a baseline understanding of extinction without the presence of hunters, when the environment remains static, and males and females have identical food-value. Once you have a baseline understanding of model dynamics, you can begin changing a few variables at a time to see if extinction dynamics change. \nTo examine how environment alone may impact extinction without human hunting, select one of the environmental variables – either grass-proportion or grass-regrowth – and move them a few units to represent degradation to baseline environmental conditions. Then click setup and run to observe how changes to environment might impact extinction dynamics. To continue this experiment, move the second environmental variable, to see how even greater environmental degradation impacts the extinction dynamics. Now re-run the same experiments with seasonality turned on, how does the presence of a ‘dry’ and ‘wet’ season impact extinction, herd movement, and herd demography? Do environmental conditions alone impact the likelihood of an extinction events? Identify a set of model parameters that test a range of environmental conditions (excellent – poor), with or without seasonality depending on your case study. Note that these differences between environmental conditions should represent only small differences between units – avoid drastic changes, which will make analysis very difficult. \nTo examine how hunting pressure and hunting behavior might impact extinction dynamics, begin by keeping the environment static. First decide on the population density of hunters. We recommend starting with a relatively low density of hunters, then increasing the number of hunters iteratively, adding a few hunters at a time, until the landscape best approximates your case study and/or hypotheses. Then, run your experiment without changing animal sexual dimorphism to see how hunting alone might impact extinction dynamics. Once you have a baseline understanding of how hunting might impact herd movement and demographics, you c et 0.33\n- external-mortality: Range 0.0 to 0.2, Set 0.0025\n- birth-spacing: Range 0.0 to 1000.0, Set 730\n- foraging-radius: Range 1.0 to 100.0, Set 6\n- food-value-calf: Range 0.0 to 20.0, Set 3\n- seasonality: Range 0.0 to 1.0, Set 0.8\n- regrowth-time: Range 0.0 to 365.0, Set 3\n- stop-at-max-ticks: Range None provided, Set True\n- stop-at-max-herd-size: Range None provided, Set False\n- grass-growth: Range None provided, Set True\n- keep-initial-grass-pattern: Range None provided, Set True\n- imortal-foragers: Range None provided, Set True\n- food-storage: Range None provided, Set True\n- max-ticks: Range None provided, Set 73000\n- max-herd-size: Range None provided, Set 500\n\nThis plot represents the percentage of landscape patches that are currently vegetated (i.e., green), indicating the availability of fodder (grass) for the prey animals.", "trend_prompt_pre_compression_path": "", "trend_prompt_pre_compression_text": "", "trend_prompt_compressed_path": "", "trend_prompt_compressed_text": "", "trend_prompt_compression_path": "cases/01_fauna_none_plot_rep1/03_trends/plot_14/trend_prompt_compression.json", "trend_prompt_compression_text": "{\n  \"triggered\": false,\n  \"compression_count\": 0,\n  \"attempt_count\": 1,\n  \"attempts\": [\n    {\n      \"attempt_index\": 1,\n      \"table_downsample_stride\": 1,\n      \"compression_tier\": 0,\n      \"prompt_length\": 3020\n    }\n  ]\n}", "trend_output_path": "cases/01_fauna_none_plot_rep1/03_trends/plot_14/trend_output.txt", "trend_output_text": "The percentage of green patches in the simulation begins near 33% at the initial step, drops rapidly to approximately 32.2% by step 50, and stabilizes slightly higher at around 32.5% by step 300. From step 300 to step 700, a sharp decline occurs, reducing the percentage to approximately 23% by step 375. Following this decline, the values recover rapidly to around 33.5% by step 700. Between step 700 and step 1100, the percentage remains relatively stable near 33.5%. From step 1100 to step 1200, a sharp decline occurs to approximately 29%, followed by a recovery to 33.5% by step 1300. From step 1300 onwards, the percentage remains consistently high, fluctuating slightly around 33.5% until the end of the simulation at step 2300.", "table_csv_path": "", "table_csv_text": "", "table_series_csv_path": "", "table_json_path": "", "image_path": "cases/01_fauna_none_plot_rep1/03_trends/plot_14/trend_evidence_plot.png", "trend_trace_path": "cases/01_fauna_none_plot_rep1/03_trends/plot_14/trend_trace.json", "error_text": ""}]}]}</script>
  <script>
    const data = JSON.parse(document.getElementById("viewer-data").textContent);
    const caseList = document.getElementById("case-list");
    const details = document.getElementById("details");
    const search = document.getElementById("search");
    const statusFilter = document.getElementById("status-filter");
    const runMeta = document.getElementById("run-meta");
    let currentCaseId = data.cases[0] ? data.cases[0].case_id : null;

    runMeta.innerHTML = [
      data.run_root,
      `success: ${data.success}`,
      data.run_log_path ? `<a href="${escapeHtmlAttr(relPath(data.run_log_path))}">run log</a>` : "",
      data.report_path ? `<a href="${escapeHtmlAttr(relPath(data.report_path))}">report json</a>` : ""
    ].filter(Boolean).join("<br>");

    function relPath(absoluteOrRunRelative) {{
      if (!absoluteOrRunRelative) return "";
      if (
        absoluteOrRunRelative.includes("/runs/")
        || absoluteOrRunRelative.startsWith("cases/")
      ) {{
        return absoluteOrRunRelative.replace(/^.*?openrouter_smoke_latest\//, "");
      }}
      return absoluteOrRunRelative;
    }}

    function escapeHtml(text) {{
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }}

    function escapeHtmlAttr(text) {{
      return escapeHtml(text).replaceAll('"', "&quot;");
    }}

    function filteredCases() {{
      const q = search.value.trim().toLowerCase();
      const status = statusFilter.value;
      return data.cases.filter((item) => {{
        const hay = [
          item.case_id,
          item.abm,
          item.evidence_mode,
          item.prompt_variant,
          item.error_text
        ].join(" ").toLowerCase();
        const matchesText = !q || hay.includes(q);
        const matchesStatus = status === "all" || (status === "ok" ? item.success : !item.success);
        return matchesText && matchesStatus;
      }});
    }}

    function renderList() {{
      const items = filteredCases();
      if (!items.some((item) => item.case_id === currentCaseId)) {{
        currentCaseId = items[0] ? items[0].case_id : null;
      }}
      caseList.innerHTML = items.map((item) => `
        <button
          class="case-btn ${item.case_id === currentCaseId ? "active" : ""}"
          data-case-id="${escapeHtmlAttr(item.case_id)}"
        >
          <div class="top">
            <strong>${escapeHtml(item.case_id)}</strong>
            <span class="badge ${item.success ? "ok" : "bad"}">${item.success ? "ok" : "failed"}</span>
          </div>
          <div>${escapeHtml(item.abm)} · ${escapeHtml(item.evidence_mode)} · ${escapeHtml(item.prompt_variant)}</div>
          <div class="meta">
            ${item.resumed_from_existing ? '<span class="resumed">reused</span>' : 'fresh'}
            ${item.error_text ? " · " + escapeHtml(item.error_text) : ""}
          </div>
        </button>
      `).join("");
      caseList.querySelectorAll(".case-btn").forEach((button) => {{
        button.addEventListener("click", () => {{
          currentCaseId = button.dataset.caseId;
          renderList();
          renderDetails();
        }});
      }});
      renderDetails();
    }}

    function renderDetails() {{
      const item = data.cases.find((entry) => entry.case_id === currentCaseId);
      if (!item) {{
        details.innerHTML = '<div class="card empty">No matching case.</div>';
        return;
      }}
      details.innerHTML = `
        <div class="grid">
          <div class="hero">
            <div class="hero-top">
              <div>
                <div class="hero-title">${escapeHtml(item.case_id)}</div>
                <div class="meta">${escapeHtml(item.abm)}</div>
              </div>
              <span class="badge ${item.success ? "ok" : "bad"}">${item.success ? "ok" : "failed"}</span>
            </div>
            <div class="chip-row">
              <span class="chip">evidence: ${escapeHtml(item.evidence_mode)}</span>
              <span class="chip">prompt: ${escapeHtml(item.prompt_variant)}</span>
              <span class="chip">model: ${escapeHtml(item.model || "n/a")}</span>
              <span class="chip">${item.resumed_from_existing ? "reused from prior run" : "fresh in this run"}</span>
            </div>
          </div>
          <div class="summary-grid">
            ${summaryCard("Case dir", item.paths.case_dir)}
            ${summaryCard("Context prompt", item.paths.context_prompt)}
            ${summaryCard("Trend prompt", item.paths.trend_prompt)}
            ${summaryCard("Run log", data.run_log_path ? relPath(data.run_log_path) : "n/a")}
          </div>
          ${
            item.error_text
              ? `<div class="card"><span class="label">Error</span><pre>${escapeHtml(item.error_text)}</pre></div>`
              : ""
          }
          <div class="detail-grid">
            ${textCard("Parameters", item.paths.parameters, item.parameters_text)}
            ${textCard("Documentation", item.paths.documentation, item.documentation_text)}
            ${textCard("Context Prompt", item.paths.context_prompt, item.context_prompt_text)}
            ${textCard("Context Output", item.paths.context_output, item.context_output_text)}
            ${item.trends && item.trends.length
              ? textCard("Validation State", item.paths.validation_state, "")
              : textCard("Trend Prompt", item.paths.trend_prompt, item.trend_prompt_text)}
            ${item.trends && item.trends.length
              ? textCard("Case Review CSV", item.paths.review_csv, "")
              : textCard("Trend Output", item.paths.trend_output, item.trend_output_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Hyperparameters", item.paths.hyperparameters, item.hyperparameters_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Evidence Table", item.paths.table_csv, item.table_csv_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Compression State", item.paths.trend_prompt_compression, item.trend_prompt_compression_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard(
                  "Prompt Before Compression",
                  item.paths.trend_prompt_pre_compression,
                  item.trend_prompt_pre_compression_text
                )}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Compressed Prompt", item.paths.trend_prompt_compressed, item.trend_prompt_compressed_text)}
          </div>
          <div class="detail-grid">
            ${item.trends && item.trends.length
              ? textCard("Trace Files", item.paths.context_trace, "")
              : imageCard("Evidence Plot", item.paths.image)}
            ${item.trends && item.trends.length
              ? linkCard("Case Files", [
                  ["context trace", item.paths.context_trace],
                  ["review csv", item.paths.review_csv],
                  ["validation state", item.paths.validation_state]
                ])
              : linkCard("Trace Files", [
                  ["context trace", item.paths.context_trace],
                  ["trend trace", item.paths.trend_trace]
                ])}
          </div>
          ${item.trends && item.trends.length ? renderTrendSections(item.trends) : ""}
        </div>
      `;
    }}

    function summaryCard(label, value) {{
      return `
        <div class="card">
          <span class="label">${escapeHtml(label)}</span>
          <div>${escapeHtml(value || "n/a")}</div>
        </div>
      `;
    }}

    function textCard(label, path, text) {{
      const body = text ? `<pre>${escapeHtml(text)}</pre>` : '<div class="empty">not present</div>';
      const link = path ? `<div class="meta"><a href="${escapeHtmlAttr(path)}">${escapeHtml(path)}</a></div>` : "";
      return `<div class="card"><span class="label">${escapeHtml(label)}</span>${link}${body}</div>`;
    }}

    function imageCard(label, path) {{
      if (!path) {{
        return `
          <div class="card">
            <span class="label">${escapeHtml(label)}</span>
            <div class="empty">not present</div>
          </div>
        `;
      }}
      return `
        <div class="card">
          <span class="label">${escapeHtml(label)}</span>
          <div class="meta"><a href="${escapeHtmlAttr(path)}">${escapeHtml(path)}</a></div>
          <img src="${escapeHtmlAttr(path)}" alt="${escapeHtmlAttr(label)}">
        </div>
      `;
    }}

    function linkCard(label, links) {{
      const items = links
        .filter(([, path]) => path)
        .map(([name, path]) => `<div><a href="${escapeHtmlAttr(path)}">${escapeHtml(name)}</a></div>`)
        .join("");
      return `
        <div class="card">
          <span class="label">${escapeHtml(label)}</span>
          ${items || '<div class="empty">not present</div>'}
        </div>
      `;
    }}

    function renderTrendSections(trends) {{
      return `
        <div class="grid">
          ${trends.map((trend) => `
            <div class="card">
              <span class="label">${escapeHtml(trend.plot_id)}</span>
              ${
                trend.error_text
                  ? `<div class="meta" style="color: var(--bad);">${escapeHtml(trend.error_text)}</div>`
                  : ""
              }
              <div class="detail-grid">
                ${textCard("Trend Prompt", trend.trend_prompt_path, trend.trend_prompt_text)}
                ${textCard("Trend Output", trend.trend_output_path, trend.trend_output_text)}
                ${textCard("Evidence Table", trend.table_csv_path, trend.table_csv_text)}
                ${imageCard("Evidence Plot", trend.image_path)}
                ${textCard(
                    "Compression State",
                    trend.trend_prompt_compression_path,
                    trend.trend_prompt_compression_text
                  )}
                ${textCard(
                    "Prompt Before Compression",
                    trend.trend_prompt_pre_compression_path,
                    trend.trend_prompt_pre_compression_text
                  )}
                ${textCard("Compressed Prompt", trend.trend_prompt_compressed_path, trend.trend_prompt_compressed_text)}
              </div>
              <div class="meta" style="margin-top: 10px;">
                ${trend.trend_trace_path ? `<a href="${escapeHtmlAttr(trend.trend_trace_path)}">trend trace</a>` : ""}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }}

    search.addEventListener("input", renderList);
    statusFilter.addEventListener("change", renderList);
    renderList();
  </script>
</body>
</html>
