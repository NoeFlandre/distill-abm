      gap: 16px;

      margin-bottom: 10px;

      gap: 8px;
      margin-top: 8px;

      padding: 4px 10px;

      color: var(--muted);
      font-size: 12px;

      border-radius: var(--radius);
      background: var(--panel);

Logo interface to establish the socio-natural dynamics of the experiment matrix. Broadly, the model allows you to change the following unitless categories that exist on a continuous scale: fodder availability, seasonality, relative animal food value, animal fecundity, lifespans of hunters and animals, relative hunting danger, as well as the energy required to move in the environment. Ideally, experimental dynamics will demonstrate how environmental conditions, human hunting, and animal life history interact to either accelerate or buffer extinction or create equilibrium conditions which do not result in an extinction event. The temporal units used in NetLogo are “ticks,” which can be scaled to any temporal granularity.  \nThe landscape consists of an abstract square universe that wraps at the edges. It exists on a 211x211 patch matrix and a relative spatial scale. Although these patches are unitless, it may, be useful to image the landscape in km2 based on approximations of daily distance traveled by megaherbivores. For example, S. caffer walks approximately 3.4 km/day which scales a single patch to ~911 km2. These values will change for each case study.\n\nThis is an interactive manual model. The user can fully manipulate the variables to test a wide range of hypotheses related to extinction in a socio-natural system. To begin first select the variables you would like to test in your extinction scenario (i.e., environmental patchiness or animal fecundity). We recommend keeping most variables constant, and only changing 1-3 variables per experiment. The user can also set the max ticks, which will stop the experiment after a designated number of ticks. Once the independent variables have been selected, use the interactive sliders to move them a few units at a time, avoiding large, drastic jumps in relative scale. When you are ready to run your experiment click the setup button. This will generate a landscape that matches the environment, herd demography, and hunting ironment. Additionally, users can choose to the keep-initial option, which limited grass regrowth only to the areas that were initially vegetated. Users can also utilize a seasonality slider, which limits grass regrowth to a user determined seasonal cycle. \nThe process of refining and experimenting with the relative value of independent and constant variables can be repeated until the experimental parameters appears to behave logically and work well to test the user’s hypotheses. When selecting values, it is useful to keep in mind that these values have relative, as opposed to absolute, value. For example, when picking a value for food-value-male and food-value-female (the energy hunter’s gain from eating male or female prey) do not think of the numbers in terms of kilogram or calories, but rather the relative size of males to females. In this case, a 2–5-unit difference may be sufficient to demonstrate how sexual dimorphism may impact human hunters operating under optimal foraging logic. The experiment will stop when: 1) human hunters die off, or 3) the experiment reaches the maximum number of ticks set by the user.\n\nSUMMARY STATISTICS\nSummary statistics are shown on the bottom left side in labeled output boxes and are formatting as continuous line graphs that reflect new data from each tick. They include: \n    • Number of prey-items taken per 10 ticks. Three lines are generated to show how many males, females, or post-partum females are hunted over the past 10-tick cycle.  \n    • Proportion of grazed to ungrazed grass on a scale of 0-100. \n    • Forager energy, which changes as hunters exploit prey and move in their environment. \n    • Number of animals in the environment. Three lines are generated to show how many males, females, or post-partum females are in the environment over time.\n(More information about the NetLogo Behavior Space needed)\n\nTo begin manual experiments prior to identifying final experimental parameters for the behavior space, establish a baseline understanding of extinction without the presence of hunters, when the environment remains static, and males and females have identical food-value. Once you have a baseline understanding of model dynamics, you can begin changing a few variables at a time to see if extinction dynamics change. \nTo examine how environment alone may impact extinction without human hunting, select one of the environmental variables – either grass-proportion or grass-regrowth – and move them a few units to represent degradation to baseline environmental conditions. Then click setup and run to observe how changes to environment might impact extinction dynamics. To continue this experiment, move the second environmental variable, to see how even greater environmental degradation impacts the extinction dynamics. Now re-run the same experiments with seasonality turned on, how does the presence of a ‘dry’ and ‘wet’ season impact extinction, herd movement, and herd demography? Do environmental conditions alone impact the likelihood of an extinction events? Identify a set of model parameters that test a range of environmental conditions (excellent – poor), with or without seasonality depending on your case study. Note that these differences between environmental conditions should represent only small differences between units – avoid drastic changes, which will make analysis very difficult. \nTo examine how hunting pressure and hunting behavior might impact extinction dynamics, begin by keeping the environment static. First decide on the population density of hunters. We recommend starting with a relatively low density of hunters, then increasing the number of hunters iteratively, adding a few hunters at a time, until the landscape best approximates your case study and/or hypotheses. Then, run your experiment without changing animal sexual dimorphism to see how hunting alone might impact extinction dynamics. Once you have a baseline understanding of how hunting might impact herd m andscape is a flat, rectangle with no topographical features. It would be useful to add GIS data so that specific case studies can be explored in greater detail. For example, how might environmental refugia impact – or buffer – the likelihood of extinction, like case studies seen in North America. To accurately test these hypotheses, the topographical features of the environmental must have more detail and plasticity.\n\nThe Diet Breadth Model is also a NetLogo model developed for testing how foraging decisions react dynamically to environmental feedback upon prey encounter. This model is simpler, and does not include environmental seasonality or animal life history.\n\nThis model was created by Isaac I.T. Ullah, PhD, and Miriam C. Kopels, MA, at San Diego State University and The University of Nevada, Las Vegas. It is intended for educational and experimental purposes only and comes with no warrantee or guarantee of accuracy. The original idea for this model derived from Richard Klein’s case study of giant buffalo at the Klasies River Mouth, South Africa, during the Middle Stone Age. It is available under the GNU public license, and is published on the web at  Please cite the authors if you use this model in any publication.", "parameters_text": "We have 29 parameters:\n  - init-foragers, from 0.0 to 100.0. We set it to 20.\n  - processing-cost-males, from 0.0 to 20.0. We set it to 6.\n  - food-value-males, from 5.0 to 100.0. We set it to 30.\n  - maximum-lifespan, from 0.0 to 12000.0. We set it to 10220.\n  - processing-cost-females, from 0.0 to 20.0. We set it to 3.\n  - food-value-females, from 5.0 to 100.0. We set it to 27.\n  - init-prey, from 0.0 to 1000.0. We set it to 250.\n  - internal-mortality, from 0.0 to 0.2. We set it to 0.025.\n  - age-of-senescence, from 0.0 to 10000.0. We set it to 7300.\n  - ticks-per-year, from 0.0 to 720.0. We set it to 365.\n  - animals-gain-from-food, from 0.0 to 10.0. We set it to 1.5.\n  - animals-starvation-threshold, from 0.0 to 100.0. We set it to 25.\n  - animals-movement-cost, from 0.0 to 10.0. We set it to 1.\n  - foragers-movement-cost, from 0.0 to 10.0. We set it to 1.\n  - grass-proportion, from 0.0 to 1.0. We set it to 0.33.\n  - external-mortality, from 0.0 to 0.2. We set it to 0.0025.\n  - birth-spacing, from 0.0 to 1000.0. We set it to 730.\n  - foraging-radius, from 1.0 to 100.0. We set it to 6.\n  - food-value-calf, from 0.0 to 20.0. We set it to 3.\n  - seasonality, from 0.0 to 1.0. We set it to 0.8.\n  - regrowth-time, from 0.0 to 365.0. We set it to 3.\n  - stop-at-max-ticks. We set it to True.\n  - stop-at-max-herd-size. We set it to False.\n  - grass-growth. We set it to True.\n  - keep-initial-grass-pattern. We set it to True.\n  - imortal-foragers. We set it to True.\n  - food-storage. We set it to True.\n  - max-ticks. We set it to 73000.\n  - max-herd-size. We set it to 500.\n", "trend_prompt_text": "", "table_csv_text": "", "context_output_text": "", "trend_output_text": "", "hyperparameters_text": "", "trends": []}]}</script>
  <script>
    const data = JSON.parse(document.getElementById("viewer-data").textContent);
    const caseList = document.getElementById("case-list");
    const details = document.getElementById("details");
    const search = document.getElementById("search");
    const statusFilter = document.getElementById("status-filter");
    const runMeta = document.getElementById("run-meta");
    let currentCaseId = data.cases[0] ? data.cases[0].case_id : null;

    runMeta.innerHTML = [
      data.run_root,
      `success: ${data.success}`,
      data.run_log_path ? `<a href="${escapeHtmlAttr(relPath(data.run_log_path))}">run log</a>` : "",
      data.report_path ? `<a href="${escapeHtmlAttr(relPath(data.report_path))}">report json</a>` : ""
    ].filter(Boolean).join("<br>");

    function relPath(absoluteOrRunRelative) {{
      if (!absoluteOrRunRelative) return "";
      if (
        absoluteOrRunRelative.includes("/runs/")
        || absoluteOrRunRelative.startsWith("cases/")
      ) {{
        return absoluteOrRunRelative.replace(/^.*?openrouter_smoke_latest\//, "");
      }}
      return absoluteOrRunRelative;
    }}

    function escapeHtml(text) {{
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }}

    function escapeHtmlAttr(text) {{
      return escapeHtml(text).replaceAll('"', "&quot;");
    }}

    function filteredCases() {{
      const q = search.value.trim().toLowerCase();
      const status = statusFilter.value;
      return data.cases.filter((item) => {{
        const hay = [
          item.case_id,
          item.abm,
          item.evidence_mode,
          item.prompt_variant,
          item.error_text
        ].join(" ").toLowerCase();
        const matchesText = !q || hay.includes(q);
        const matchesStatus = status === "all" || (status === "ok" ? item.success : !item.success);
        return matchesText && matchesStatus;
      }});
    }}

    function renderList() {{
      const items = filteredCases();
      if (!items.some((item) => item.case_id === currentCaseId)) {{
        currentCaseId = items[0] ? items[0].case_id : null;
      }}
      caseList.innerHTML = items.map((item) => `
        <button
          class="case-btn ${item.case_id === currentCaseId ? "active" : ""}"
          data-case-id="${escapeHtmlAttr(item.case_id)}"
        >
          <div class="top">
            <strong>${escapeHtml(item.case_id)}</strong>
            <span class="badge ${item.success ? "ok" : "bad"}">${item.success ? "ok" : "failed"}</span>
          </div>
          <div>${escapeHtml(item.abm)} · ${escapeHtml(item.evidence_mode)} · ${escapeHtml(item.prompt_variant)}</div>
          <div class="meta">
            ${item.resumed_from_existing ? '<span class="resumed">reused</span>' : 'fresh'}
            ${item.error_text ? " · " + escapeHtml(item.error_text) : ""}
          </div>
        </button>
      `).join("");
      caseList.querySelectorAll(".case-btn").forEach((button) => {{
        button.addEventListener("click", () => {{
          currentCaseId = button.dataset.caseId;
          renderList();
          renderDetails();
        }});
      }});
      renderDetails();
    }}

    function renderDetails() {{
      const item = data.cases.find((entry) => entry.case_id === currentCaseId);
      if (!item) {{
        details.innerHTML = '<div class="card empty">No matching case.</div>';
        return;
      }}
      details.innerHTML = `
        <div class="grid">
          <div class="hero">
            <div class="hero-top">
              <div>
                <div class="hero-title">${escapeHtml(item.case_id)}</div>
                <div class="meta">${escapeHtml(item.abm)}</div>
              </div>
              <span class="badge ${item.success ? "ok" : "bad"}">${item.success ? "ok" : "failed"}</span>
            </div>
            <div class="chip-row">
              <span class="chip">evidence: ${escapeHtml(item.evidence_mode)}</span>
              <span class="chip">prompt: ${escapeHtml(item.prompt_variant)}</span>
              <span class="chip">model: ${escapeHtml(item.model || "n/a")}</span>
              <span class="chip">${item.resumed_from_existing ? "reused from prior run" : "fresh in this run"}</span>
            </div>
          </div>
          <div class="summary-grid">
            ${summaryCard("Case dir", item.paths.case_dir)}
            ${summaryCard("Context prompt", item.paths.context_prompt)}
            ${summaryCard("Trend prompt", item.paths.trend_prompt)}
            ${summaryCard("Run log", data.run_log_path ? relPath(data.run_log_path) : "n/a")}
          </div>
          ${
            item.error_text
              ? `<div class="card"><span class="label">Error</span><pre>${escapeHtml(item.error_text)}</pre></div>`
              : ""
          }
          <div class="detail-grid">
            ${textCard("Parameters", item.paths.parameters, item.parameters_text)}
            ${textCard("Documentation", item.paths.documentation, item.documentation_text)}
            ${textCard("Context Prompt", item.paths.context_prompt, item.context_prompt_text)}
            ${textCard("Context Output", item.paths.context_output, item.context_output_text)}
            ${item.trends && item.trends.length
              ? textCard("Validation State", item.paths.validation_state, "")
              : textCard("Trend Prompt", item.paths.trend_prompt, item.trend_prompt_text)}
            ${item.trends && item.trends.length
              ? textCard("Case Review CSV", item.paths.review_csv, "")
              : textCard("Trend Output", item.paths.trend_output, item.trend_output_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Hyperparameters", item.paths.hyperparameters, item.hyperparameters_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Evidence Table", item.paths.table_csv, item.table_csv_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Compression State", item.paths.trend_prompt_compression, item.trend_prompt_compression_text)}
            ${item.trends && item.trends.length
              ? ""
              : textCard(
                  "Prompt Before Compression",
                  item.paths.trend_prompt_pre_compression,
                  item.trend_prompt_pre_compression_text
                )}
            ${item.trends && item.trends.length
              ? ""
              : textCard("Compressed Prompt", item.paths.trend_prompt_compressed, item.trend_prompt_compressed_text)}
          </div>
          <div class="detail-grid">
            ${item.trends && item.trends.length
              ? textCard("Trace Files", item.paths.context_trace, "")
              : imageCard("Evidence Plot", item.paths.image)}
            ${item.trends && item.trends.length
              ? linkCard("Case Files", [
                  ["context trace", item.paths.context_trace],
                  ["review csv", item.paths.review_csv],
                  ["validation state", item.paths.validation_state]
                ])
              : linkCard("Trace Files", [
                  ["context trace", item.paths.context_trace],
                  ["trend trace", item.paths.trend_trace]
                ])}
          </div>
          ${item.trends && item.trends.length ? renderTrendSections(item.trends) : ""}
        </div>
      `;
    }}

    function summaryCard(label, value) {{
      return `
        <div class="card">
          <span class="label">${escapeHtml(label)}</span>
          <div>${escapeHtml(value || "n/a")}</div>
        </div>
      `;
    }}

    function textCard(label, path, text) {{
      const body = text ? `<pre>${escapeHtml(text)}</pre>` : '<div class="empty">not present</div>';
      const link = path ? `<div class="meta"><a href="${escapeHtmlAttr(path)}">${escapeHtml(path)}</a></div>` : "";
      return `<div class="card"><span class="label">${escapeHtml(label)}</span>${link}${body}</div>`;
    }}

    function imageCard(label, path) {{
      if (!path) {{
        return `
          <div class="card">
            <span class="label">${escapeHtml(label)}</span>
            <div class="empty">not present</div>
          </div>
        `;
      }}
      return `
        <div class="card">
          <span class="label">${escapeHtml(label)}</span>
          <div class="meta"><a href="${escapeHtmlAttr(path)}">${escapeHtml(path)}</a></div>
          <img src="${escapeHtmlAttr(path)}" alt="${escapeHtmlAttr(label)}">
        </div>
      `;
    }}

    function linkCard(label, links) {{
      const items = links
        .filter(([, path]) => path)
        .map(([name, path]) => `<div><a href="${escapeHtmlAttr(path)}">${escapeHtml(name)}</a></div>`)
        .join("");
      return `
        <div class="card">
          <span class="label">${escapeHtml(label)}</span>
          ${items || '<div class="empty">not present</div>'}
        </div>
      `;
    }}

    function renderTrendSections(trends) {{
      return `
        <div class="grid">
          ${trends.map((trend) => `
            <div class="card">
              <span class="label">${escapeHtml(trend.plot_id)}</span>
              ${
                trend.error_text
                  ? `<div class="meta" style="color: var(--bad);">${escapeHtml(trend.error_text)}</div>`
                  : ""
              }
              <div class="detail-grid">
                ${textCard("Trend Prompt", trend.trend_prompt_path, trend.trend_prompt_text)}
                ${textCard("Trend Output", trend.trend_output_path, trend.trend_output_text)}
                ${textCard("Evidence Table", trend.table_csv_path, trend.table_csv_text)}
                ${imageCard("Evidence Plot", trend.image_path)}
                ${textCard(
                    "Compression State",
                    trend.trend_prompt_compression_path,
                    trend.trend_prompt_compression_text
                  )}
                ${textCard(
                    "Prompt Before Compression",
                    trend.trend_prompt_pre_compression_path,
                    trend.trend_prompt_pre_compression_text
                  )}
                ${textCard("Compressed Prompt", trend.trend_prompt_compressed_path, trend.trend_prompt_compressed_text)}
              </div>
              <div class="meta" style="margin-top: 10px;">
                ${trend.trend_trace_path ? `<a href="${escapeHtmlAttr(trend.trend_trace_path)}">trend trace</a>` : ""}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }}

    search.addEventListener("input", renderList);
    statusFilter.addEventListener("change", renderList);
    renderList();
  </script>
</body>
</html>
